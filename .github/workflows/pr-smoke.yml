# Step 1: prove Actions runs on PRs. Next steps: permissions, diff, LLM, post comment.
name: PR smoke

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show PR context
        run: |
          echo "PR #${{ github.event.pull_request.number }}"
          echo "${{ github.head_ref }} → ${{ github.base_ref }}"
          echo "Action ran successfully."
