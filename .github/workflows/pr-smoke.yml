# PR: full diff (truncated if huge) → Gemini → one issue comment on the PR.
name: PR AI review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR context and diff
        run: |
          echo "PR #${{ github.event.pull_request.number }}"
          echo "${{ github.head_ref }} → ${{ github.base_ref }}"
          git diff "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > pr.diff
          echo "Diff bytes: $(wc -c < pr.diff)"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gemini review and PR comment
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python scripts/pr_llm_review.py pr.diff
