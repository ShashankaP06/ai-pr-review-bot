# PR: full diff (truncated if huge) → Gemini → one issue comment on the PR.
name: PR AI review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR context and diff
        run: |
          echo "PR #${{ github.event.pull_request.number }}"
          echo "${{ github.head_ref }} → ${{ github.base_ref }}"
          git diff "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > pr.diff
          echo "Diff bytes: $(wc -c < pr.diff)"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Provider: set OPENAI_COMPAT_BASE_URL (e.g. self-hosted runner + Ollama) to skip Gemini.
      # GitHub-hosted ubuntu cannot reach your PC's localhost — use Gemini here or a self-hosted runner.
      - name: LLM review and PR comment
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-1.5-flash
          OPENAI_COMPAT_BASE_URL: ${{ vars.OPENAI_COMPAT_BASE_URL }}
          OPENAI_COMPAT_MODEL: ${{ vars.OPENAI_COMPAT_MODEL }}
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENAI_COMPAT_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "GEMINI_MODEL=$GEMINI_MODEL"
          echo "OPENAI_COMPAT_BASE_URL=${OPENAI_COMPAT_BASE_URL:-}"
          python scripts/pr_llm_review.py pr.diff
