# PR: checkout + logs + post a test comment (next: diff → LLM → real review text).
name: PR smoke

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show PR context
        run: |
          echo "PR #${{ github.event.pull_request.number }}"
          echo "${{ github.head_ref }} → ${{ github.base_ref }}"
          echo "Action ran successfully."

      - name: Post smoke comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -f -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -d '{"body":"**PR smoke:** CI posted this comment to verify `pull-requests: write` and the issues API. (Not from an LLM.)"}'
